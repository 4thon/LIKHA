<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Likha | Item Details</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
  <link rel="stylesheet" href="../assets/css/item-detail.css" />
</head>
<body data-auth="required">
  <header class="topbar" id="topbar">
    <div class="brand">
      <a href="../index.html">
        <img src="../assets/images/ui/logo.png" alt="Likha Logo" class="logo">
      </a>
    </div>
    <div class="topbar-actions">
      <nav class="nav">
        <a href="accessories.html">Accessories</a>
        <a href="jewelry.html">Jewelry</a>
        <a href="clothing.html">Clothing</a>
        <a href="home-decor.html">Home &amp; Decor</a>
        <a href="login.html" class="login">Login</a>
      </nav>
      <button class="inbox-btn" type="button" data-inbox-toggle aria-label="Open inbox">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3l7 7-4 1-6 6-4 1 1-4 6-6 1-4z" />
          <path d="M3 21l6-1" />
        </svg>
        <span class="inbox-badge" data-inbox-count>0</span>
      </button>
    </div>
  </header>

  <main class="item-page content">
    <section class="item-layout item-card" id="itemCard">
      <div class="item-media">
        <img id="itemImage" src="../assets/images/accessories/a.2.jpg" alt="Item preview" />
      </div>
      <div class="item-info">
        <div class="item-title-row">
          <h1 id="itemTitle" class="card-title">Handmade Crochet Wallet</h1>
          <div class="item-likes">
            <button class="like" type="button" aria-label="Like item">&#9825;</button>
            <span id="itemLikes">102</span>
          </div>
        </div>
        <div id="itemPrice" class="item-price price">&#8369;80</div>
        <div class="item-meta">
          <div><strong>By:</strong> <span id="itemMaker" class="maker">Alwina Lapuz</span></div>
          <div><strong>Category:</strong> <span id="itemCategory">Accessories</span></div>
          <div><strong>Description:</strong> <span id="itemDescription">Kindly email the design you want based on the picture.</span></div>
        </div>

        <div class="process">
          <h3>Process Gallery</h3>
          <div class="process-grid" id="processGrid"></div>
        </div>

        <div class="item-actions">
          <button class="cart-add" type="button" data-add-cart>
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 6h14l-2 9H7L6 6z" />
              <path d="M6 6l-2-3H2" />
              <circle cx="9" cy="20" r="1.5" />
              <circle cx="17" cy="20" r="1.5" />
            </svg>
            <span class="cart-count" data-cart-count>0</span>
          </button>
          <button class="action-btn buy-btn" type="button" data-buy>BUY</button>
          <a class="action-btn secondary commission-btn" id="commissionLink" href="commission.html">COMMISSION</a>
        </div>
      </div>
    </section>
  </main>

  <aside class="inbox-panel" id="inboxPanel" aria-hidden="true">
    <div class="inbox-header">
      <div>
        <h3>Inbox</h3>
        <p>Items you saved or bought.</p>
      </div>
      <button class="inbox-close" type="button" data-inbox-close aria-label="Close">&times;</button>
    </div>
    <div class="inbox-section">
      <h4>Cart Items</h4>
      <div class="inbox-list" id="cartList"></div>
    </div>
    <div class="inbox-section">
      <h4>Purchased Items</h4>
      <div class="inbox-list" id="purchaseList"></div>
    </div>
  </aside>
  <div class="inbox-overlay" data-inbox-close></div>

  <script src="../assets/js/store.js"></script>
  <script src="../assets/js/activity.js"></script>
  <script src="../assets/js/artists-data.js"></script>
  <script src="../assets/js/item-detail.js"></script>
  <script src="../assets/js/script.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
