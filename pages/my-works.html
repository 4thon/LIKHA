<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Likha | My Works</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Angkor&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/my-works.css" />
</head>
<body data-auth="required">
  <div class="page">
    <header class="topbar" id="topbar">
      <div class="brand">
        <a href="../index.html">
          <img src="../assets/images/ui/logo.png" alt="Likha Logo" class="logo" />
        </a>
      </div>
      <div class="topbar-right">
        <nav class="nav">
          <a href="accessories.html">Accessories</a>
          <a href="jewelry.html">Jewelry</a>
          <a href="clothing.html">Clothing</a>
          <a href="home-decor.html">Home &amp; Decor</a>
          <a href="login.html" class="login">Login</a>
        </nav>
        <div class="notif-wrap">
          <button class="notif-btn" type="button" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
              <path d="M13.73 21a2 2 0 01-3.46 0" />
            </svg>
          </button>
          <span class="notif-badge">0</span>
          <div class="notif-panel" aria-hidden="true">
            <h4>Recent Activity</h4>
            <div class="notif-list"></div>
          </div>
        </div>
      </div>
    </header>

    <main class="dashboard">
      <aside class="sidebar">
        <a class="side-btn" href="LikedItems.html">
          <span class="side-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 21s-7-4.35-7-10a4 4 0 017-2 4 4 0 017 2c0 5.65-7 10-7 10z" />
            </svg>
          </span>
          Liked Items
        </a>
        <a class="side-btn" href="commission.html">
          <span class="side-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h12a2 2 0 012 2z" />
            </svg>
          </span>
          Commission Request
        </a>
        <a class="side-btn" href="profile.html">
          <span class="side-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20a8 8 0 0116 0" />
            </svg>
          </span>
          Profile Settings
        </a>
        <a class="side-btn active" href="my-works.html">
          <span class="side-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 3h7v7" />
              <path d="M10 14L21 3" />
              <path d="M21 14v7h-7" />
              <path d="M3 10V3h7" />
              <path d="M3 14v7h7" />
            </svg>
          </span>
          My Works
        </a>
        <button class="side-btn" type="button" data-logout>
          <span class="side-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
              <path d="M16 17l5-5-5-5" />
              <path d="M21 12H9" />
            </svg>
          </span>
          Logout
        </button>
      </aside>

      <section class="content">
        <div class="content-header">
          <h1>My Works</h1>
          <p>Manage your handmade items and see their activity.</p>
        </div>

        <div class="works-grid" id="worksGrid"></div>
        <button class="add-work-btn" type="button" data-open-modal aria-label="Add product">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20l4-1 11-11-3-3L5 16l-1 4z" />
            <path d="M13 5l3 3" />
          </svg>
        </button>
      </section>
    </main>
  </div>

  <div class="modal" id="workModal" aria-hidden="true">
    <div class="modal-content work-modal" role="dialog" aria-modal="true" aria-labelledby="workModalTitle">
      <button class="modal-close" type="button" data-close-modal aria-label="Close">&times;</button>
      <h2 id="workModalTitle">Add Product</h2>
      <div class="work-form-layout">
        <div class="work-preview">
          <label class="upload-box main-upload">
            <input type="file" id="workImageInput" accept="image/*" />
            <span>Upload Image</span>
            <img id="workPreviewImage" alt="Preview" />
          </label>
        </div>
        <form id="workForm" class="work-form">
          <label class="field">
            Item type
            <input type="text" id="workTitle" placeholder="e.g. Handmade Crochet Wallet" required />
          </label>
          <label class="field">
            Category
            <select id="workCategory">
              <option>Accessories</option>
              <option>Jewelry</option>
              <option>Clothing</option>
              <option>Home &amp; Decor</option>
            </select>
          </label>
          <label class="field">
            Price
            <div class="price-row">
              <span>&#8369;</span>
              <input type="number" id="workPrice" placeholder="0" min="0" />
            </div>
          </label>
          <label class="field">
            Description
            <textarea id="workDescription" rows="4" placeholder="Describe the item and process..."></textarea>
          </label>
          <div class="field">
            <span>Process Gallery</span>
            <div class="process-upload">
              <label class="upload-box">
                <input type="file" class="process-input" accept="image/*" />
                <span>Add step</span>
                <img alt="Process preview" />
              </label>
              <label class="upload-box">
                <input type="file" class="process-input" accept="image/*" />
                <span>Add step</span>
                <img alt="Process preview" />
              </label>
            </div>
          </div>
          <button class="primary-btn publish-btn" type="submit">Publish</button>
        </form>
      </div>
    </div>
  </div>

  <script src="../assets/js/store.js"></script>
  <script src="../assets/js/activity.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <script src="../assets/js/script.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/my-works.js"></script>
</body>
</html>
